<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Master Admin Panel</title>
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: #131b2e;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .admin-container {
            width: 100%; max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            box-sizing: border-box; border: 1px solid var(--border-color);
        }

        .admin-title {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(to right, #f43f5e, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px; font-weight: 700; color: #f43f5e;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-top: 10px; margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color); padding-bottom: 5px;
        }

        .input-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
        
        input, select {
            width: 100%; padding: 12px; background: #0a0f1d;
            border: 1px solid var(--border-color); border-radius: 10px;
            color: #fff; box-sizing: border-box; outline: none; font-size: 14px;
        }
        input:focus { border-color: #ec4899; }

        .btn-action {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            border: none; color: #fff; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 14px;
            transition: opacity 0.2s; margin-bottom: 10px;
        }
        .btn-action:hover { opacity: 0.9; }

        .list-box {
            background: #0a0f1d; border-radius: 12px;
            padding: 10px; max-height: 180px; overflow-y: auto;
            border: 1px solid var(--border-color); margin-bottom: 15px;
        }

        .item-row {
            background: #1e293b; padding: 10px; border-radius: 8px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px;
        }
        .item-row:last-child { margin-bottom: 0; }

        .btn-delete {
            background: #ef4444; border: none; color: white;
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        .footer-link {
            display: block; text-align: center; color: var(--text-sub);
            text-decoration: none; font-size: 12px; margin-top: 15px;
        }
        .footer-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-title">🛠️ Master Admin Panel</div>

        <!-- SECTION 1: PENGATURAN CUAN KILAT -->
        <div class="section-title">⚡ Pengaturan Cuan Kilat</div>
        
        <div class="input-group">
            <label>Jumlah Saldo per Klaim Kilat (Rp):</label>
            <input type="number" id="rewardAmount" placeholder="Contoh: 5000">
        </div>

        <div class="input-group">
            <label>Batas Klaim Maksimal per Pengguna:</label>
            <input type="number" id="maxClaims" placeholder="Contoh: 3">
        </div>

        <button class="btn-action" onclick="saveCuanKilatConfig()">💾 Simpan Pengaturan Kilat</button>


        <!-- SECTION 2: INPUT VIDEO DOODSTREAM -->
        <div class="section-title" style="margin-top: 25px;">🎬 Pengaturan Video DoodStream</div>

        <div class="input-group">
            <label>Judul Video (Gunakan kalimat Clickbait):</label>
            <input type="text" id="vidTitle" placeholder="Contoh: Video Bocah Viral TikTok Terbaru">
        </div>

        <div class="input-group">
            <label>Kode File DoodStream:</label>
            <input type="text" id="vidCode" placeholder="Contoh: w72ja8slxpoq">
        </div>

        <div class="input-group">
            <label>Ukuran File (Opsional):</label>
            <input type="text" id="vidSize" value="15.0 MB">
        </div>

        <button class="btn-action" style="background: linear-gradient(135deg, #2563eb, #1d4ed8);" onclick="addVideo()">➕ Tambahkan Video</button>

        <label style="margin-top: 10px;">Daftar Video Aktif:</label>
        <div class="list-box" id="videoListContainer">
            <!-- Item video dimuat di sini -->
        </div>

        <a href="index.html" class="footer-link">👁️ Buka Halaman Depan Aplikasi</a>
    </div>

    <script>
        // --- LOGIK CONFIG CUAN KILAT ---
        function loadCuanKilatConfig() {
            // Ambil data lama atau gunakan default value jika kosong
            const currentReward = localStorage.getItem('kilat_reward') || '5000';
            const currentMax = localStorage.getItem('kilat_max_claims') || '3';

            document.getElementById('rewardAmount').value = currentReward;
            document.getElementById('maxClaims').value = currentMax;
        }

        function saveCuanKilatConfig() {
            const reward = document.getElementById('rewardAmount').value.trim();
            const maxClaims = document.getElementById('maxClaims').value.trim();

            if (!reward || !maxClaims) {
                alert('Semua konfigurasi Cuan Kilat wajib diisi!');
                return;
            }

            localStorage.setItem('kilat_reward', reward);
            localStorage.setItem('kilat_max_claims', maxClaims);

            alert('🚀 Konfigurasi Cuan Kilat berhasil diperbarui!');
        }


        // --- LOGIK VIDEO MANAGEMENT ---
        function loadActiveVideos() {
            const container = document.getElementById('videoListContainer');
            let videos = JSON.parse(localStorage.getItem('cuan_videos')) || [];
            container.innerHTML = '';

            if (videos.length === 0) {
                container.innerHTML = '<p style="color:#64748b; font-size:12px; text-align:center; margin: 10px 0;">Belum ada video terdaftar.</p>';
                return;
            }

            videos.forEach((video, index) => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div style="max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <strong>${video.title}</strong><br>
                        <span style="color:#94a3b8; font-size:11px;">Kode: ${video.code} (${video.size})</span>
                    </div>
                    <button class="btn-delete" onclick="deleteVideo(${index})">Hapus</button>
                `;
                container.appendChild(row);
            });
        }

        function addVideo() {
            const title = document.getElementById('vidTitle').value.trim();
            const code = document.getElementById('vidCode').value.trim();
            const size = document.getElementById('vidSize').value.trim();

            if (!title || !code) {
                alert('Judul dan Kode Video DoodStream wajib diisi!');
                return;
            }

            let videos = JSON.parse(localStorage.getItem('cuan_videos')) || [];
            videos.push({ title: title, code: code, size: size });
            localStorage.setItem('cuan_videos', JSON.stringify(videos));

            // Reset form input video
            document.getElementById('vidTitle').value = '';
            document.getElementById('vidCode').value = '';

            alert('🎉 Video baru berhasil dimasukkan!');
            loadActiveVideos();
        }

        function deleteVideo(index) {
            if (confirm('Apakah Anda yakin ingin menghapus video ini?')) {
                let videos = JSON.parse(localStorage.getItem('cuan_videos')) || [];
                videos.splice(index, 1);
                localStorage.setItem('cuan_videos', JSON.stringify(videos));
                loadActiveVideos();
            }
        }

        // Jalankan saat halaman dibuka pertama kali
        window.onload = function() {
            loadCuanKilatConfig();
            loadActiveVideos();
        };
    </script>
</body>
</html>
