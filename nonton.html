<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Nonton & Hasilkan</title>
    
    <!-- Script Adsterra Tetap Dipasang Biar Cuan Dobel -->
    <script src="https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js"></script>

    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-gradient: linear-gradient(135deg, #2563eb, #1d4ed8);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 400px;
            background: rgba(19, 27, 46, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            box-sizing: border-box; border: 1px solid var(--border-color);
        }

        .app-title { 
            font-size: 22px; font-weight: 800; 
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; text-align: center;
        }

        .btn-nav {
            display: inline-block; width: 100%; padding: 10px;
            background: #1e293b; color: #fff; text-decoration: none;
            border-radius: 10px; font-weight: bold; margin-bottom: 20px;
            box-sizing: border-box; text-align: center; border: 1px solid var(--border-color);
        }

        /* Video Player Area */
        #player-container {
            display: none; width: 100%; margin-bottom: 20px;
            background: #000; border-radius: 14px; overflow: hidden;
            aspect-ratio: 16/9;
        }
        #player-container iframe { width: 100%; height: 100%; border: none; }

        .video-list { display: flex; flex-direction: column; gap: 12px; }
        
        .video-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 10px; display: flex; gap: 12px;
            cursor: pointer; transition: 0.2s; align-items: center;
        }
        .video-card:hover { background: rgba(30, 41, 59, 0.9); }
        
        .video-thumb {
            width: 100px; height: 60px; background: #1e293b;
            border-radius: 8px; object-fit: cover;
        }
        
        .video-info { text-align: left; flex: 1; }
        .video-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.3; }
        .video-size { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .ad-banner { width: 100%; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-title">🎬 CuanVideo Player</div>
        
        <!-- Navigasi balik ke halaman utama -->
        <a href="index.html" class="btn-nav">⬅️ Kembali ke Dompet</a>

        <!-- Tempat Video Diputar -->
        <div id="player-container">
            <iframe id="dood-player" src="" allowfullscreen="true" scrolling="no"></iframe>
        </div>

        <div style="font-size: 14px; color: var(--text-sub); text-align: left; margin-bottom: 10px; font-weight: bold;">
            Pilih Video untuk Ditonton:
        </div>

        <!-- Daftar Video Otomatis dari API Doodstream -->
        <div class="video-list" id="listVideo">
            <p style="text-align: center; color: var(--text-sub);">Memuat daftar video...</p>
        </div>

        <!-- Iklan Adsterra Banner -->
        <div class="ad-banner">
            <script src="https://recallscarce.com/58d95ca21f65a9e0e77987ce3c0aa9f2/invoke.js"></script>
        </div>
    </div>

    <script>
        // API Key DoodStream Anda sudah terpasang secara permanen
        const DOOD_API_KEY = "132791thy50ilas62ojx7z"; 
        
        function loadDoodVideos() {
            const listContainer = document.getElementById('listVideo');
            
            // Memanggil API Doodstream untuk mengambil file video terbaru dari akun Anda
            fetch(`https://doodapi.com/api/file/list?key=${DOOD_API_KEY}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 200 && data.result && data.result.files.length > 0) {
                    listContainer.innerHTML = ''; 
                    
                    data.result.files.forEach(file => {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => putarVideo(file.file_code);

                        // Fallback jika video belum memiliki gambar thumbnail (splash_img)
                        const thumbImg = file.splash_img ? file.splash_img : 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=150&auto=format&fit=crop';
                        const fileSize = file.size ? `${(file.size / (1024*1024)).toFixed(1)} MB` : 'Unknown';

                        card.innerHTML = `
                            <img class="video-thumb" src="${thumbImg}" alt="thumb">
                            <div class="video-info">
                                <div class="video-title">${file.title}</div>
                                <div class="video-size">Ukuran: ${fileSize}</div>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                } else {
                    listContainer.innerHTML = '<p style="color:#94a3b8; text-align:center;">Belum ada video di akun DoodStream Anda. Silakan upload video terlebih dahulu di dashboard DoodStream.</p>';
                }
            })
            .catch(err => {
                listContainer.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal memuat video. Periksa koneksi atau status API Key.</p>';
                console.error(err);
            });
        }

        function putarVideo(fileCode) {
            const playerContainer = document.getElementById('player-container');
            const iframe = document.getElementById('dood-player');
            
            // Menggunakan domain embed standar player Doodstream
            iframe.src = `https://dood.li/e/${fileCode}`;
            playerContainer.style.display = 'block';
            
            // TRICK CUAN: Begitu user klik nonton, lempar juga iklan Direct Link Adsterra ke tab baru
            window.open("https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js", "_blank");
            
            // Scroll halus ke posisi player paling atas agar langsung terlihat oleh user
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Jalankan perintah load saat halaman berhasil dimuat penuh
        window.onload = loadDoodVideos;
    </script>
</body>
</html>
