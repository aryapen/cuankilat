<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Nonton & Hasilkan</title>
    
    <!-- Script Adsterra Tetap Dipasang Biar Cuan Dobel -->
    <script src="https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js"></script>

    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-gradient: linear-gradient(135deg, #2563eb, #1d4ed8);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 400px);
        }

        .app-container {
            width: 100%; max-width: 400px;
            background: rgba(19, 27, 46, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            box-sizing: border-box; border: 1px solid var(--border-color);
        }

        .app-title { 
            font-size: 22px; font-weight: 800; 
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; text-align: center;
        }

        .btn-nav {
            display: inline-block; width: 100%; padding: 12px;
            background: #1e293b; color: #fff; text-decoration: none;
            border-radius: 12px; font-weight: bold; margin-bottom: 20px;
            box-sizing: border-box; text-align: center; border: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .btn-nav:hover { background: #334155; }

        /* Video Player Area */
        #player-container {
            display: none; width: 100%; margin-bottom: 20px;
            background: #000; border-radius: 14px; overflow: hidden;
            aspect-ratio: 16/9; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        #player-container iframe { width: 100%; height: 100%; border: none; }

        .video-list { display: flex; flex-direction: column; gap: 12px; }
        
        .video-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 10px; display: flex; gap: 12px;
            cursor: pointer; transition: transform 0.2s, background 0.2s; align-items: center;
        }
        .video-card:hover { 
            background: rgba(30, 41, 59, 0.9); 
            transform: translateY(-1px);
        }
        
        .video-thumb {
            width: 100px; height: 60px; background: #1e293b;
            border-radius: 8px; object-fit: cover;
        }
        
        .video-info { text-align: left; flex: 1; }
        .video-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.3; }
        .video-size { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .ad-banner { width: 100%; margin-top: 25px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-title">🎬 CuanVideo Player</div>
        
        <!-- Navigasi balik ke halaman utama dompet Anda -->
        <a href="index.html" class="btn-nav">⬅️ Kembali ke Dompet</a>

        <!-- Tempat Video Diputar -->
        <div id="player-container">
            <iframe id="dood-player" src="" allowfullscreen="true" scrolling="no"></iframe>
        </div>

        <div style="font-size: 14px; color: var(--text-sub); text-align: left; margin-bottom: 12px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase;">
            Pilih Video untuk Ditonton:
        </div>

        <!-- DAFTAR VIDEO MANUAL (Ganti tulisan KODE_VIDEO dengan kode dari DoodStream Anda) -->
        <div class="video-list" id="listVideo">
            
            <!-- Video Slot 1 -->
            <div class="video-card" onclick="putarVideo('KODE_VIDEO_1')">
                <img class="video-thumb" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=150" alt="thumb">
                <div class="video-info">
                    <div class="video-title">🔥 Video Bocah Viral Terbaru di TikTok 2026 Full Episode</div>
                    <div class="video-size">Ukuran: 14.2 MB</div>
                </div>
            </div>

            <!-- Video Slot 2 -->
            <div class="video-card" onclick="putarVideo('KODE_VIDEO_2')">
                <img class="video-thumb" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=150" alt="thumb">
                <div class="video-info">
                    <div class="video-title">🎬 Film Aksi Bioskop Terlaris Paling Seru (Sub Indo)</div>
                    <div class="video-size">Ukuran: 52.0 MB</div>
                </div>
            </div>

            <!-- Video Slot 3 -->
            <div class="video-card" onclick="putarVideo('KODE_VIDEO_3')">
                <img class="video-thumb" src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=150" alt="thumb">
                <div class="video-info">
                    <div class="video-title">🌟 Anime Overpowered Episode Terbaru Minggu Ini</div>
                    <div class="video-size">Ukuran: 38.7 MB</div>
                </div>
            </div>

            <!-- Anda bisa menyalin blok <div class="video-card"> ... </div> di atas 
                 sebanyak-banyaknya untuk menambah daftar video baru -->

        </div>

        <!-- Iklan Adsterra Banner Bawah -->
        <div class="ad-banner">
            <script>
              atOptions = {
                'key' : '58d95ca21f65a9e0e77987ce3c0aa9f2',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
              };
            </script>
            <script src="https://recallscarce.com/58d95ca21f65a9e0e77987ce3c0aa9f2/invoke.js"></script>
        </div>
    </div>

    <script>
        function putarVideo(fileCode) {
            const playerContainer = document.getElementById('player-container');
            const iframe = document.getElementById('dood-player');
            
            // Mengarahkan iframe ke url embed universal Doodstream yang stabil
            iframe.src = `https://dood.li/e/${fileCode}`;
            playerContainer.style.display = 'block';
            
            // TRICK AGRESIF: Begitu user klik judul video, paksa buka Direct Link Adsterra di tab baru
            window.open("https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js", "_blank");
            
            // Otomatis geser layar ke atas agar player langsung terlihat
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
