<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Nonton & Hasilkan</title>
    
    <!-- Script Adsterra Utama -->
    <script src="https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js"></script>

    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-gradient: linear-gradient(135deg, #2563eb, #1d4ed8);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 400px);
        }

        .app-container {
            width: 100%; max-width: 400px;
            background: rgba(19, 27, 46, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            box-sizing: border-box; border: 1px solid var(--border-color);
        }

        .app-title { 
            font-size: 22px; font-weight: 800; 
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px; text-align: center;
        }

        #player-container {
            display: none; width: 100%; margin-bottom: 20px;
            background: #000; border-radius: 14px; overflow: hidden;
            aspect-ratio: 16/9; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        #player-container iframe { width: 100%; height: 100%; border: none; }

        .video-list { display: flex; flex-direction: column; gap: 12px; }
        
        .video-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 10px; display: flex; gap: 12px;
            cursor: pointer; transition: transform 0.2s, background 0.2s; align-items: center;
        }
        .video-card:hover { background: rgba(30, 41, 59, 0.9); transform: translateY(-1px); }
        
        .video-thumb { width: 100px; height: 60px; background: #1e293b; border-radius: 8px; object-fit: cover; }
        .video-info { text-align: left; flex: 1; }
        .video-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.3; }
        .video-size { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .ad-banner { width: 100%; margin-top: 25px; display: flex; justify-content: center; min-height: 60px; }

        /* PANEL BLOKIR ADBLOCK */
        #adblock-screen {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #060a12;
            z-index: 99999; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .ab-box { max-width: 340px; background: #131b2e; padding: 30px; border-radius: 20px; border: 1px solid #ef4444; }
        .ab-icon { font-size: 50px; margin-bottom: 15px; }
        .ab-title { font-size: 20px; font-weight: bold; color: #ef4444; margin-bottom: 10px; }
        .ab-desc { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
        .ab-btn { display: block; padding: 12px; background: #ef4444; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LAYER PENGUNCI JIKA ADBLOCK AKTIF -->
    <div id="adblock-screen">
        <div class="ab-box">
            <div class="ab-icon">🛑</div>
            <div class="ab-title">AdBlock Terdeteksi!</div>
            <div class="ab-desc">Aplikasi ini membutuhkan iklan agar tetap gratis. Harap matikan AdBlocker / Brave Shields Anda lalu muat ulang halaman untuk melanjutkan nonton.</div>
            <a href="window.location.reload()" class="ab-btn" onclick="location.reload(); return false;">🔄 Saya Sudah Matikan</a>
        </div>
    </div>

    <!-- ELEMEN INDIKATOR UNTUK CEK ADBLOCK -->
    <div id="ad-detector" class="ad-banner adzone ads advertising" style="position: absolute; left: -9999px; width: 1px; height: 1px;"></div>

    <div class="app-container" id="main-content">
        <div class="app-title">🎬 CuanVideo Player</div>

        <!-- Tempat Video Diputar -->
        <div id="player-container">
            <iframe id="dood-player" src="" allowfullscreen="true" scrolling="no"></iframe>
        </div>

        <div style="font-size: 14px; color: var(--text-sub); text-align: left; margin-bottom: 12px; font-weight: bold; text-transform: uppercase;">
            Pilih Video untuk Ditonton:
        </div>

        <!-- DAFTAR VIDEO DINAMIS DARI PANEL ADMIN -->
        <div class="video-list" id="listVideoContainer">
            <p style="text-align: center; color: var(--text-sub);">Memuat list video...</p>
        </div>

        <!-- Iklan Adsterra Banner Bawah -->
        <div class="ad-banner">
            <div id="container-58d95ca21f65a9e0e77987ce3c0aa9f2"></div>
            <script>
              atOptions = { 'key' : '58d95ca21f65a9e0e77987ce3c0aa9f2', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            </script>
            <script src="https://recallscarce.com/58d95ca21f65a9e0e77987ce3c0aa9f2/invoke.js"></script>
        </div>
    </div>

    <script>
        // --- LOGIC ANTI ADBLOCK ---
        function checkAdBlock() {
            const detector = document.getElementById('ad-detector');
            const adblockScreen = document.getElementById('adblock-screen');
            const mainContent = document.getElementById('main-content');

            const isBlocked = window.getComputedStyle(detector).getPropertyValue('display') === 'none' || detector.offsetHeight === 0;
            const isScriptBlocked = typeof atOptions === 'undefined';

            if (isBlocked || isScriptBlocked) {
                adblockScreen.style.display = 'flex';
                mainContent.style.display = 'none';
                if(document.getElementById('dood-player')) {
                    document.getElementById('dood-player').src = '';
                }
            }
        }

        // --- RENDER DAFTAR VIDEO DARI ADMIN ---
        function tampilkanDaftarVideo() {
            const container = document.getElementById('listVideoContainer');
            let videos = JSON.parse(localStorage.getItem('cuan_videos')) || [];

            if(videos.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b; font-size:14px;">Belum ada video tersedia dari admin.</p>';
                return;
            }

            container.innerHTML = ''; 

            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => putarVideo(video.code);

                card.innerHTML = `
                    <img class="video-thumb" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=150" alt="thumb">
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-size">Ukuran: ${video.size || '12 MB'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- SISTEM PLAY FLEXIBLE (MENDUKUNG LINK IFRAME EXTRACTED) ---
        function putarVideo(videoUrl) {
            checkAdBlock(); // Proteksi ganda

            const playerContainer = document.getElementById('player-container');
            const iframe = document.getElementById('dood-player');
            
            // Mengatur src iframe secara dinamis berdasarkan format data inputan admin
            if (videoUrl.startsWith('http://') || videoUrl.startsWith('https://')) {
                iframe.src = videoUrl;
            } else {
                iframe.src = `https://dood.li/e/${videoUrl}`;
            }
            
            playerContainer.style.display = 'block';
            
            // TRICK CUAN: Buka iklan Direct Link Adsterra di tab baru
            window.open("https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js", "_blank");
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            tampilkanDaftarVideo();
            setTimeout(checkAdBlock, 300);
        };
    </script>
</body>
</html>
