<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Multi AdSystem</title>
    
    <!-- SCRIPT UTAMA ADSTERRA KAMU (SEMUA FORMAT YANG DICENTANG AKAN DIKONTROL OLEH SCRIPT INI) -->
    <script src="https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #171e31;
            --primary: #2563eb;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 15px;
            padding-bottom: 100px; /* Jarak ekstra di bawah agar konten tidak tertutup iklan banner */
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 400px;
            background: linear-gradient(145deg, #131b2e, #1e293b);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            box-sizing: border-box; border: 1px solid #2e3b56;
        }

        .app-title { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 20px; }

        .wallet-card {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 20px; border-radius: 18px; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .wallet-label { font-size: 13px; color: #e2e8f0; text-transform: uppercase; margin: 0; }
        .wallet-balance { font-size: 34px; font-weight: 700; margin: 8px 0; }

        .limit-info {
            font-size: 11px; color: #e2e8f0; background: rgba(0, 0, 0, 0.15);
            padding: 6px 10px; border-radius: 8px; margin-top: 5px;
        }

        .section-title {
            font-size: 15px; font-weight: 700; color: var(--text-sub);
            text-transform: uppercase; margin: 20px 0 12px 0; text-align: left; width: 100%;
        }

        .task-card {
            background: var(--card-bg); border: 1px solid #242f4d;
            padding: 16px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .task-details { text-align: left; }
        .task-name { font-weight: 600; font-size: 15px; }
        .task-reward { font-size: 14px; color: #4ade80; font-weight: 700; margin-top: 2px; }

        .btn-play {
            background: var(--primary); color: #fff; border: none;
            padding: 10px 18px; font-weight: 700; border-radius: 10px; cursor: pointer;
        }
        .btn-play:disabled {
            background: #1e293b; color: #64748b; border: 1px solid #334155; cursor: not-allowed;
        }

        .input-group { margin-top: 15px; text-align: left; width: 100%; }
        .input-group label { font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 8px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; background: #171e31; border: 1px solid #2e3b56;
            border-radius: 10px; color: #fff; font-size: 15px; box-sizing: border-box; outline: none;
        }

        .btn-withdraw-main {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #2563eb, #1d4ed8);
            border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700;
            margin-top: 25px; cursor: pointer; box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        /* AREA KHUSUS JIKA SCRIPT ADSTERRA INGIN MENAMPILKAN BANNER MELAYANG */
        .banner-container-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 999;
            background: transparent; padding-bottom: 5px;
        }

        #adblock-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.98); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        .ab-box {
            background: #1e293b; border: 2px solid #ef4444; border-radius: 20px;
            padding: 30px; max-width: 360px; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2); text-align: center;
        }
        .ab-icon { font-size: 50px; color: #ef4444; margin-bottom: 15px; }
        .ab-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        .ab-desc { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
        .ab-btn {
            background: #ef4444; color: #fff; border: none; padding: 12px 25px;
            font-weight: 700; border-radius: 10px; cursor: pointer; width: 100%;
        }
    </style>

    <script src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js" onerror="adBlockDetected()" async></script>
</head>
<body>

    <div id="adblock-overlay">
        <div class="ab-box">
            <div class="ab-icon">🛑</div>
            <div class="ab-title">AdBlock Terdeteksi!</div>
            <div class="ab-desc">Mohon matikan AdBlock / Brave Shields kamu lalu segarkan halaman ini untuk melanjutkan mencari cuan.</div>
            <button class="ab-btn" onclick="window.location.reload()">SAYA SUDAH MATIKAN ADBLOCK</button>
        </div>
    </div>

    <div class="app-container">
        <div class="app-title">📱 CuanWallet Live</div>

        <div class="wallet-card">
            <p class="wallet-label">Total Saldo Anda</p>
            <div class="wallet-balance">Rp <span id="userBalance">0</span></div>
            <div class="limit-info">
                Batas Tarik Hari Ini: <span id="withdrawnToday">0</span> / 100.000
            </div>
        </div>

        <div class="section-title">Misi Pasif & Popunder</div>

        <div class="task-card">
            <div class="task-details">
                <div class="task-name">Misi Sponsor Premium 1</div>
                <div class="task-reward">+ Rp 25</div>
            </div>
            <button class="btn-play" onclick="jalankanMisi(25, this)">Mulai</button>
        </div>

        <div class="task-card">
            <div class="task-details">
                <div class="task-name">Misi Sponsor Premium 2</div>
                <div class="task-reward">+ Rp 50</div>
            </div>
            <button class="btn-play" onclick="jalankanMisi(50, this)">Mulai</button>
        </div>

        <div class="section-title">Form Pencairan</div>
        
        <div class="input-group">
            <label>Pilih E-Wallet Tujuan:</label>
            <select id="walletType">
                <option value="DANA">DANA</option>
                <option value="GoPay">GoPay</option>
                <option value="OVO">OVO</option>
                <option value="LinkAja">LinkAja</option>
                <option value="ShopeePay">ShopeePay</option>
            </select>
        </div>

        <div class="input-group">
            <label>Nomor HP E-Wallet:</label>
            <input type="number" id="walletNumber" placeholder="Contoh: 08123456xxx">
        </div>

        <button class="btn-withdraw-main" onclick="processWithdraw()">💸 TARIK SALDO CUAN</button>
    </div>

    <!-- AREA BANNER BAWAH (Jika kode Adsterra mengembalikan format Banner/In-Page) -->
    <div class="banner-container-bottom" id="bannerSpace"></div>

    <script>
        let balance = parseInt(localStorage.getItem('cuan_balance')) || 0;
        let dailyWithdrawn = parseInt(localStorage.getItem('cuan_withdrawn')) || 0;
        
        const MIN_WITHDRAW = 20000;  
        const MAX_DAILY_LIMIT = 100000; 

        const balanceEl = document.getElementById('userBalance');
        const withdrawnTodayEl = document.getElementById('withdrawnToday');

        balanceEl.innerText = balance;
        withdrawnTodayEl.innerText = dailyWithdrawn.toLocaleString('id-ID');

        const CHECK_LINK = "https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js";

        function adBlockDetected() {
            document.getElementById('adblock-overlay').style.display = 'flex';
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                fetch(CHECK_LINK, { mode: 'no-cors' }).catch(() => {
                    adBlockDetected();
                });
            }, 1000);
        });

        // KETIKA USER KLIK: Memicu event klik global agar Popunder murni Adsterra yang ada di script .js mendeteksi aktivitas dan langsung meledak keluar
        function jalankanMisi(rewardAmount, buttonElement) {
            buttonElement.disabled = true;
            let waktuTunggu = 15; 
            buttonElement.innerText = `Memvalidasi... (${waktuTunggu}s)`;

            let hitungMundur = setInterval(() => {
                waktuTunggu--;
                buttonElement.innerText = `Memvalidasi... (${waktuTunggu}s)`;

                if (waktuTunggu <= 0) {
                    clearInterval(hitungMundur);
                    
                    buttonElement.innerText = "Klaim Saldo 🎉";
                    buttonElement.style.background = "#e5e7eb";
                    buttonElement.style.color = "#000";
                    buttonElement.disabled = false;
                    
                    buttonElement.onclick = function() {
                        balance += rewardAmount;
                        localStorage.setItem('cuan_balance', balance);
                        balanceEl.innerText = balance;
                        
                        alert(`Sukses! Koin Rp ${rewardAmount} masuk ke saldo.`);
                        
                        buttonElement.innerText = "Mulai";
                        buttonElement.style.background = "var(--primary)";
                        buttonElement.style.color = "#fff";
                        buttonElement.onclick = function() { jalankanMisi(rewardAmount, this); };
                    };
                }
            }, 1000);
        }

        function processWithdraw() {
            const eWallet = document.getElementById('walletType').value;
            const noWallet = document.getElementById('walletNumber').value;
            
            if (!noWallet) { alert("Masukkan nomor HP E-Wallet tujuan!"); return; }
            
            if (balance < MIN_WITHDRAW) { 
                alert(`Gagal! Batas minimal penarikan adalah Rp ${MIN_WITHDRAW.toLocaleString('id-ID')}.`); 
                return; 
            }

            if (dailyWithdrawn + balance > MAX_DAILY_LIMIT) {
                alert(`Gagal! Batas harian penarikan terlampaui.`);
                return;
            }

            alert(`Sukses!\nSaldo Rp ${balance.toLocaleString('id-ID')} sedang diproses ke akun ${eWallet}: ${noWallet}.`);
            
            dailyWithdrawn += balance;
            balance = 0;

            localStorage.setItem('cuan_balance', balance);
            localStorage.setItem('cuan_withdrawn', dailyWithdrawn);

            withdrawnTodayEl.innerText = dailyWithdrawn.toLocaleString('id-ID');
            balanceEl.innerText = balance;
        }
    </script>
</body>
</html>
