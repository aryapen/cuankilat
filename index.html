<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanWallet - Multi AdSystem</title>
    
    <script src="https://recallscarce.com/03/bb/ec/03bbec523dda08fd3f190c1773d348e4.js"></script>

    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-gradient: linear-gradient(135deg, #2563eb, #1d4ed8);
            --accent-gradient: linear-gradient(135deg, #10b981, #059669);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; 
            padding: 15px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 400px);
        }

        .app-container {
            width: 100%; 
            max-width: 400px;
            background: rgba(19, 27, 46, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px; 
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            box-sizing: border-box; 
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .app-title { 
            font-size: 22px; 
            font-weight: 800; 
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px; 
        }

        .wallet-card {
            background: var(--primary-gradient);
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.06);
            border-radius: 30px;
            transform: rotate(45deg);
        }

        .wallet-label { 
            font-size: 13px; 
            color: #e2e8f0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            margin: 0; 
        }
        
        .wallet-balance { 
            font-size: 34px; 
            font-weight: 700; 
            margin: 8px 0; 
        }

        .limit-info {
            font-size: 11px; 
            color: #e2e8f0; 
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px; 
            border-radius: 8px; 
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }

        .ad-slot-native {
            width: 100%; 
            margin: 15px 0; 
            border-radius: 12px; 
            overflow: hidden;
            background: rgba(255,255,255,0.01);
            border: 1px dashed var(--border-color);
        }
        
        .ad-slot-banner {
            width: 100%; 
            max-width: 468px; 
            margin: 25px 0 10px 0; 
            display: flex; 
            justify-content: center; 
            overflow: hidden;
            border-radius: 10px;
        }

        .section-title {
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-sub);
            text-transform: uppercase; 
            margin: 20px 0 12px 0; 
            text-align: left; 
            width: 100%;
            letter-spacing: 0.5px;
        }

        .task-card {
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            padding: 16px; 
            border-radius: 16px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
            transition: transform 0.2s, background 0.2s;
        }

        .task-card:hover {
            background: rgba(30, 41, 59, 0.9);
            transform: translateY(-1px);
        }

        .task-details { text-align: left; }
        .task-name { font-weight: 600; font-size: 15px; }
        .task-reward { font-size: 14px; color: #4ade80; font-weight: 700; margin-top: 2px; }

        .btn-play {
            background: var(--primary-gradient); 
            color: #fff; 
            border: none;
            padding: 10px 18px; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-play:hover:not(:disabled) {
            opacity: 0.9;
        }

        .btn-play:disabled {
            background: #1e293b; 
            color: #64748b; 
            border: 1px solid #334155; 
            cursor: not-allowed;
            box-shadow: none;
        }

        .input-group { margin-top: 15px; text-align: left; width: 100%; }
        .input-group label { font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 8px; }
        
        .input-group input, .input-group select {
            width: 100%; 
            padding: 12px; 
            background: #101726; 
            border: 1px solid var(--border-color);
            border-radius: 10px; 
            color: #fff; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #2563eb;
        }

        .btn-withdraw-main {
            width: 100%; 
            padding: 15px; 
            background: var(--accent-gradient);
            border: none; 
            border-radius: 14px; 
            color: #fff; 
            font-size: 16px; 
            font-weight: 700;
            margin-top: 25px; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }

        .btn-withdraw-main:hover {
            opacity: 0.95;
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-title">📱 CuanWallet Live</div>

        <div class="wallet-card">
            <p class="wallet-label">Total Saldo Anda</p>
            <div class="wallet-balance">Rp <span id="userBalance">0</span></div>
            <div class="limit-info">
                <span>Batas Tarik Hari Ini:</span>
                <span><span id="withdrawnToday">0</span> / 100.000</span>
            </div>
        </div>

        <div class="ad-slot-native">
            <script async="async" data-cfasync="false" src="https://recallscarce.com/ec075d98e4fc625c650d285616cbecdc/invoke.js"></script>
            <div id="container-ec075d98e4fc625c650d285616cbecdc"></div>
        </div>

        <div class="section-title">Misi Iklan Premium</div>

        <div class="task-card">
            <div class="task-details">
                <div class="task-name">Tonton Iklan Sponsor 1</div>
                <div class="task-reward">+ Rp 25</div>
            </div>
            <button class="btn-play" id="btn-task-25" onclick="jalankanMisi(25, 'btn-task-25')">Mulai</button>
        </div>

        <div class="task-card">
            <div class="task-details">
                <div class="task-name">Tonton Iklan Sponsor 2</div>
                <div class="task-reward">+ Rp 50</div>
            </div>
            <button class="btn-play" id="btn-task-50" onclick="jalankanMisi(50, 'btn-task-50')">Mulai</button>
        </div>

        <div class="section-title">Form Pencairan</div>
        
        <div class="input-group">
            <label>Pilih E-Wallet Tujuan:</label>
            <select id="walletType">
                <option value="DANA">DANA</option>
                <option value="GoPay">GoPay</option>
                <option value="OVO">OVO</option>
                <option value="LinkAja">LinkAja</option>
                <option value="ShopeePay">ShopeePay</option>
            </select>
        </div>

        <div class="input-group">
            <label>Nomor HP E-Wallet:</label>
            <input type="text" id="walletNumber" inputmode="numeric" pattern="[0-9]*" placeholder="Contoh: 08123456xxx">
        </div>

        <button class="btn-withdraw-main" onclick="processWithdraw()">💸 TARIK SALDO CUAN</button>

        <div class="ad-slot-banner">
            <script>
              atOptions = {
                'key' : '58d95ca21f65a9e0e77987ce3c0aa9f2',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
              };
            </script>
            <script src="https://recallscarce.com/58d95ca21f65a9e0e77987ce3c0aa9f2/invoke.js"></script>
        </div>

    </div>

    <script>
        let balance = parseInt(localStorage.getItem('cuan_balance')) || 0;
        let dailyWithdrawn = parseInt(localStorage.getItem('cuan_withdrawn')) || 0;
        
        const MIN_WITHDRAW = 20000;  
        const MAX_DAILY_LIMIT = 100000; 

        const balanceEl = document.getElementById('userBalance');
        const withdrawnTodayEl = document.getElementById('withdrawnToday');

        // Menampilkan data awal dengan format ribuan yang rapi
        balanceEl.innerText = balance.toLocaleString('id-ID');
        withdrawnTodayEl.innerText = dailyWithdrawn.toLocaleString('id-ID');

        function jalankanMisi(rewardAmount, buttonId) {
            const buttonElement = document.getElementById(buttonId);
            if (!buttonElement) return;

            buttonElement.disabled = true;
            let waktuTunggu = 15; 
            buttonElement.innerText = `Memvalidasi... (${waktuTunggu}s)`;

            let hitungMundur = setInterval(() => {
                waktuTunggu--;
                buttonElement.innerText = `Memvalidasi... (${waktuTunggu}s)`;

                if (waktuTunggu <= 0) {
                    clearInterval(hitungMundur);
                    
                    buttonElement.innerText = "Klaim Saldo 🎉";
                    buttonElement.style.background = "#e5e7eb";
                    buttonElement.style.color = "#000";
                    buttonElement.disabled = false;
                    
                    // Menghapus onclick lama dan menggantinya dengan fungsi klaim sekali pakai
                    buttonElement.onclick = function() {
                        // Proteksi double-click klaim
                        buttonElement.disabled = true; 

                        balance += rewardAmount;
                        localStorage.setItem('cuan_balance', balance);
                        balanceEl.innerText = balance.toLocaleString('id-ID');
                        
                        alert(`Sukses! Saldo Rp ${rewardAmount} masuk ke akun Anda.`);
                        
                        // Kembalikan tombol ke kondisi semula
                        buttonElement.innerText = "Mulai";
                        buttonElement.style.background = "var(--primary-gradient)";
                        buttonElement.style.color = "#fff";
                        buttonElement.disabled = false;
                        buttonElement.onclick = function() { jalankanMisi(rewardAmount, buttonId); };
                    };
                }
            }, 1000);
        }

        function processWithdraw() {
            const eWallet = document.getElementById('walletType').value;
            const noWallet = document.getElementById('walletNumber').value.trim();
            
            // Validasi input nomor HP yang lebih ketat
            if (!noWallet) { alert("Masukkan nomor HP E-Wallet tujuan!"); return; }
            if (noWallet.length < 10 || !/^\d+$/.test(noWallet)) { alert("Masukkan nomor HP E-Wallet yang valid (minimal 10 digit angka)!"); return; }
            
            if (balance < MIN_WITHDRAW) { alert(`Gagal! Batas minimal penarikan adalah Rp ${MIN_WITHDRAW.toLocaleString('id-ID')}.`); return; }
            if (dailyWithdrawn + balance > MAX_DAILY_LIMIT) { alert(`Gagal! Batas harian penarikan Rp ${MAX_DAILY_LIMIT.toLocaleString('id-ID')} terlampaui.`); return; }

            const dataPenarikan = {
                date: new Date().toLocaleString('id-ID'),
                wallet: eWallet,
                number: noWallet,
                amount: balance,
                status: 'Pending'
            };

            const btnWD = document.querySelector('.btn-withdraw-main');
            btnWD.disabled = true;
            btnWD.innerText = "⏳ MEMPROSES...";

            fetch('https://6a3a8924917c7b14c74db2a2.mockapi.io/withdrawals', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataPenarikan)
            })
            .then(response => {
                if (!response.ok) throw new Error('Gagal terhubung ke server Mock API');
                return response.json();
            })
            .then(data => {
                alert(`Sukses!\nSaldo Rp ${balance.toLocaleString('id-ID')} sedang diproses ke akun ${eWallet}: ${noWallet}.`);
                dailyWithdrawn += balance;
                balance = 0;

                localStorage.setItem('cuan_balance', balance);
                localStorage.setItem('cuan_withdrawn', dailyWithdrawn);
                
                withdrawnTodayEl.innerText = dailyWithdrawn.toLocaleString('id-ID');
                balanceEl.innerText = balance.toLocaleString('id-ID');
            })
            .catch(error => {
                alert('Terjadi kesalahan jaringan atau server sedang sibuk, silakan coba beberapa saat lagi.');
                console.error('Error:', error);
            })
            .finally(() => {
                btnWD.disabled = false;
                btnWD.innerText = "💸 TARIK SALDO CUAN";
            });
        }
    </script>
</body>
</html>
